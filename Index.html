<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>A-Frame VR Arcade</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-htmlembed-component@1.0.0/dist/aframe-htmlembed-component.min.js"></script>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      /* Hidden DOM content that gets rendered on cabinet screens */
      .screen-content {
        width: 640px;
        height: 480px;
        background: #000;
        border: 6px solid #222;
      }

      .screen-content iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #000;
      }
    </style>
  </head>
  <body>
    <!-- Hidden HTML sources for each cabinet screen -->
    <div id="tetris-screen" class="screen-content" style="display: none;">
      <iframe title="Tetris" src="Tetris.html"></iframe>
    </div>
    <div id="snake-screen" class="screen-content" style="display: none;">
      <iframe title="Snake" src="Snake.html"></iframe>
    </div>
    <div id="snake2-screen" class="screen-content" style="display: none;">
      <iframe title="Snake 2" src="Snake2.html"></iframe>
    </div>
    <div id="pong-screen" class="screen-content" style="display: none;">
      <iframe title="Pong" src="pong.html"></iframe>
    </div>
    <div id="breakout-screen" class="screen-content" style="display: none;">
      <iframe title="Breakout" src="Breakout.html"></iframe>
    </div>

    <a-scene background="color: #101820">
      <a-sky color="#0e0f1a"></a-sky>
      <a-plane
        position="0 0 -5"
        rotation="-90 0 0"
        width="18"
        height="18"
        color="#252525"
      ></a-plane>

      <!-- Ambient lighting -->
      <a-entity light="type: ambient; color: #cccccc; intensity: 0.45"></a-entity>
      <a-entity light="type: directional; color: #ffffff; intensity: 0.8" position="1 4 2"></a-entity>

      <!-- CABINET 1: Tetris -->
      <a-entity position="-4 0 -6" rotation="0 15 0">
        <a-box position="0 0.6 0" width="0.9" height="1.2" depth="0.9" color="#1f2937"></a-box>
        <a-box position="0 1.05 0.32" width="0.9" height="0.12" depth="0.5" rotation="-20 0 0" color="#374151"></a-box>
        <a-box position="0 1.45 0.08" width="0.9" height="0.26" depth="0.55" color="#111827"></a-box>
        <a-entity position="0 1.3 0.5" rotation="-10 0 0" geometry="primitive: plane; width: 0.62; height: 0.44" material="transparent: true" htmlembed="target: #tetris-screen; ppu: 1024"></a-entity>
        <a-text value="TETRIS" position="-0.22 1.47 0.37" color="#34d399" width="1.5"></a-text>
      </a-entity>

      <!-- CABINET 2: Snake -->
      <a-entity position="-2 0 -6" rotation="0 8 0">
        <a-box position="0 0.6 0" width="0.9" height="1.2" depth="0.9" color="#2d1b69"></a-box>
        <a-box position="0 1.05 0.32" width="0.9" height="0.12" depth="0.5" rotation="-20 0 0" color="#4c1d95"></a-box>
        <a-box position="0 1.45 0.08" width="0.9" height="0.26" depth="0.55" color="#1f1147"></a-box>
        <a-entity position="0 1.3 0.5" rotation="-10 0 0" geometry="primitive: plane; width: 0.62; height: 0.44" material="transparent: true" htmlembed="target: #snake-screen; ppu: 1024"></a-entity>
        <a-text value="SNAKE" position="-0.2 1.47 0.37" color="#86efac" width="1.5"></a-text>
      </a-entity>

      <!-- CABINET 3: Snake2 -->
      <a-entity position="0 0 -6" rotation="0 0 0">
        <a-box position="0 0.6 0" width="0.9" height="1.2" depth="0.9" color="#003049"></a-box>
        <a-box position="0 1.05 0.32" width="0.9" height="0.12" depth="0.5" rotation="-20 0 0" color="#005f73"></a-box>
        <a-box position="0 1.45 0.08" width="0.9" height="0.26" depth="0.55" color="#001f31"></a-box>
        <a-entity position="0 1.3 0.5" rotation="-10 0 0" geometry="primitive: plane; width: 0.62; height: 0.44" material="transparent: true" htmlembed="target: #snake2-screen; ppu: 1024"></a-entity>
        <a-text value="SNAKE 2" position="-0.25 1.47 0.37" color="#fca311" width="1.5"></a-text>
      </a-entity>

      <!-- CABINET 4: Pong -->
      <a-entity position="2 0 -6" rotation="0 -8 0">
        <a-box position="0 0.6 0" width="0.9" height="1.2" depth="0.9" color="#3f3f46"></a-box>
        <a-box position="0 1.05 0.32" width="0.9" height="0.12" depth="0.5" rotation="-20 0 0" color="#52525b"></a-box>
        <a-box position="0 1.45 0.08" width="0.9" height="0.26" depth="0.55" color="#27272a"></a-box>
        <a-entity position="0 1.3 0.5" rotation="-10 0 0" geometry="primitive: plane; width: 0.62; height: 0.44" material="transparent: true" htmlembed="target: #pong-screen; ppu: 1024"></a-entity>
        <a-text value="PONG" position="-0.16 1.47 0.37" color="#f43f5e" width="1.5"></a-text>
      </a-entity>

      <!-- CABINET 5: Breakout -->
      <a-entity position="4 0 -6" rotation="0 -15 0">
        <a-box position="0 0.6 0" width="0.9" height="1.2" depth="0.9" color="#064e3b"></a-box>
        <a-box position="0 1.05 0.32" width="0.9" height="0.12" depth="0.5" rotation="-20 0 0" color="#065f46"></a-box>
        <a-box position="0 1.45 0.08" width="0.9" height="0.26" depth="0.55" color="#022c22"></a-box>
        <a-entity position="0 1.3 0.5" rotation="-10 0 0" geometry="primitive: plane; width: 0.62; height: 0.44" material="transparent: true" htmlembed="target: #breakout-screen; ppu: 1024"></a-entity>
        <a-text value="BREAKOUT" position="-0.3 1.47 0.37" color="#facc15" width="1.5"></a-text>
      </a-entity>

      <a-camera position="0 1.6 2.8"></a-camera>
    </a-scene>
  </body>
</html>
