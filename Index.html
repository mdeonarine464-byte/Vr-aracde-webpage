<!-- Include the A-Frame library -->
<!DOCTYPE html>
<html>
  <head>
    <title>A-Frame Arcade Cabinet</title>
    <!-- Include the A-Frame library -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Background environment -->
      <a-sky color="#ECECEC"></a-sky>

      <!-- MAIN CABINET BODY -->
      <!-- The lower base of the machine -->
      <a-box position="0 0.6 -1" width="0.6" height="1.2" depth="0.6" color="#222"></a-box>

      <!-- CONTROL PANEL -->
      <!-- Tilted box for the joystick/buttons area -->
      <a-box position="0 0.9 -0.65" width="0.6" height="0.1" depth="0.3" rotation="-20 0 0" color="#444"></a-box>

      <!-- SCREEN AREA -->
      <!-- Black inset representing the monitor -->
      <a-box position="0 1.3 -0.85" width="0.5" height="0.4" depth="0.1" rotation="-10 0 0" color="#000"></a-box>

      <!-- TOP MARQUEE -->
      <!-- The header area where titles usually go -->
      <a-box position="0 1.6 -0.8" width="0.6" height="0.2" depth="0.4" color="#333"></a-box>

      <!-- SIDE PANELS -->
      <!-- Thin walls to give it the classic silhouette -->
      <a-box position="-0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8" color="#111"></a-box>
      <a-box position="0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8" color="#111"></a-box>

      <!-- Camera for viewing -->
      <a-camera position="0 1.6 1"></a-camera>
    </a-scene>
  </body>
</html>
