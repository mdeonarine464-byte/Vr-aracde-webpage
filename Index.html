<!DOCTYPE html>
<html>
  <head>
    <title>A-Frame Arcade Row</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-html-shader@1.1.0/dist/aframe-html-shader.min.js"></script>
    <style>
      .screen-source {
        position: fixed;
        left: -99999px;
        top: 0;
        width: 400px;
        height: 320px;
        border: 0;
        background: #000;
      }
    </style>
  </head>
  <body>
    <!-- Hidden iframe sources rendered onto cabinet screens -->
    <iframe id="breakoutScreen" class="screen-source" src="Breakout.html" title="Breakout"></iframe>
    <iframe id="snakeScreen" class="screen-source" src="Snake.html" title="Snake"></iframe>
    <iframe id="snake2Screen" class="screen-source" src="Snake2.html" title="Snake 2"></iframe>
    <iframe id="tetrisScreen" class="screen-source" src="Tetris.html" title="Tetris"></iframe>
    <iframe id="pongScreen" class="screen-source" src="pong.html" title="Pong"></iframe>

    <a-scene>
      <a-sky color="#101820"></a-sky>
      <a-plane position="0 0 -3" width="18" height="8" color="#1f2937"></a-plane>
      <a-plane position="0 -0.05 -3" width="18" height="8" rotation="-90 0 0" color="#111827"></a-plane>

      <!-- Cabinet 1: Breakout -->
      <a-entity position="-4 0 0">
        <a-box position="0 0.6 -1" width="0.6" height="1.2" depth="0.6" color="#222"></a-box>
        <a-box position="0 0.9 -0.65" width="0.6" height="0.1" depth="0.3" rotation="-20 0 0" color="#444"></a-box>
        <a-box position="0 1.6 -0.8" width="0.6" height="0.2" depth="0.4" color="#333"></a-box>
        <a-box position="-0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8" color="#111"></a-box>
        <a-box position="0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8" color="#111"></a-box>

        <a-plane position="0 1.3 -0.83" width="0.48" height="0.35" rotation="-10 0 0"
                 material="shader: html; target: #breakoutScreen; fps: 30"></a-plane>
      </a-entity>

      <!-- Cabinet 2: Snake -->
      <a-entity position="-2 0 0">
        <a-box position="0 0.6 -1" width="0.6" height="1.2" depth="0.6" color="#222"></a-box>
        <a-box position="0 0.9 -0.65" width="0.6" height="0.1" depth="0.3" rotation="-20 0 0" color="#444"></a-box>
        <a-box position="0 1.6 -0.8" width="0.6" height="0.2" depth="0.4" color="#333"></a-box>
        <a-box position="-0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8" color="#111"></a-box>
        <a-box position="0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8" color="#111"></a-box>

        <a-plane position="0 1.3 -0.83" width="0.48" height="0.35" rotation="-10 0 0"
                 material="shader: html; target: #snakeScreen; fps: 30"></a-plane>
      </a-entity>

      <!-- Cabinet 3: Snake2 -->
      <a-entity position="0 0 0">
        <a-box position="0 0.6 -1" width="0.6" height="1.2" depth="0.6" color="#222"></a-box>
        <a-box position="0 0.9 -0.65" width="0.6" height="0.1" depth="0.3" rotation="-20 0 0" color="#444"></a-box>
        <a-box position="0 1.6 -0.8" width="0.6" height="0.2" depth="0.4" color="#333"></a-box>
        <a-box position="-0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8" color="#111"></a-box>
        <a-box position="0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8" color="#111"></a-box>

        <a-plane position="0 1.3 -0.83" width="0.48" height="0.35" rotation="-10 0 0"
                 material="shader: html; target: #snake2Screen; fps: 30"></a-plane>
      </a-entity>

      <!-- Cabinet 4: Tetris -->
      <a-entity position="2 0 0">
        <a-box position="0 0.6 -1" width="0.6" height="1.2" depth="0.6" color="#222"></a-box>
        <a-box position="0 0.9 -0.65" width="0.6" height="0.1" depth="0.3" rotation="-20 0 0" color="#444"></a-box>
        <a-box position="0 1.6 -0.8" width="0.6" height="0.2" depth="0.4" color="#333"></a-box>
        <a-box position="-0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8" color="#111"></a-box>
        <a-box position="0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8" color="#111"></a-box>

        <a-plane position="0 1.3 -0.83" width="0.48" height="0.35" rotation="-10 0 0"
                 material="shader: html; target: #tetrisScreen; fps: 30"></a-plane>
      </a-entity>

      <!-- Cabinet 5: Pong -->
      <a-entity position="4 0 0">
        <a-box position="0 0.6 -1" width="0.6" height="1.2" depth="0.6" color="#222"></a-box>
        <a-box position="0 0.9 -0.65" width="0.6" height="0.1" depth="0.3" rotation="-20 0 0" color="#444"></a-box>
        <a-box position="0 1.6 -0.8" width="0.6" height="0.2" depth="0.4" color="#333"></a-box>
        <a-box position="-0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8" color="#111"></a-box>
        <a-box position="0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8" color="#111"></a-box>

        <a-plane position="0 1.3 -0.83" width="0.48" height="0.35" rotation="-10 0 0"
                 material="shader: html; target: #pongScreen; fps: 30"></a-plane>
      </a-entity>

      <a-camera position="0 1.6 2.5"></a-camera>
    </a-scene>
  </body>
</html>
