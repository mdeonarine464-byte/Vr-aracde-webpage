<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>VR Arcade Lobby</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
    .menu { position: fixed; top: 16px; left: 16px; z-index: 5; background: rgba(0,0,0,.65); color: #fff; padding: 14px; border-radius: 10px; width: 260px; }
    .menu h2 { margin: 0 0 10px; font-size: 18px; }
    .menu a { color: #7ad6ff; text-decoration: none; display: block; margin: 6px 0; }
  </style>
</head>
<body>
  <div class="menu">
    <h2>Arcade Machines</h2>
    <a href="pong.html">Pong Machine</a>
    <a href="Breakout.html">Breakout Machine</a>
    <a href="Tetris.html">Tetris Machine</a>
    <a href="Snake.html">Snake Machine</a>
    <a href="Snake2.html">Snake 2 Machine</a>
    <a href="Dino-game.html">Dino Game (original)</a>
  </div>

  <a-scene background="color: #050505">
    <a-plane rotation="-90 0 0" width="30" height="30" color="#121212"></a-plane>

    <a-entity position="-4 1.4 -6">
      <a-box width="1.8" height="2.6" depth="1" color="#1a1a1a"></a-box>
      <a-box width="1.2" height="0.9" depth="0.04" color="#111" position="0 0.2 0.52"></a-box>
      <a-text value="PONG" align="center" color="#f5d46b" position="0 1 0.55" width="3"></a-text>
    </a-entity>
    <a-entity position="-1.8 1.4 -6">
      <a-box width="1.8" height="2.6" depth="1" color="#1a1a1a"></a-box>
      <a-box width="1.2" height="0.9" depth="0.04" color="#111" position="0 0.2 0.52"></a-box>
      <a-text value="BREAKOUT" align="center" color="#f5d46b" position="0 1 0.55" width="3"></a-text>
    </a-entity>
    <a-entity position="0.4 1.4 -6">
      <a-box width="1.8" height="2.6" depth="1" color="#1a1a1a"></a-box>
      <a-box width="1.2" height="0.9" depth="0.04" color="#111" position="0 0.2 0.52"></a-box>
      <a-text value="TETRIS" align="center" color="#f5d46b" position="0 1 0.55" width="3"></a-text>
    </a-entity>
    <a-entity position="2.6 1.4 -6">
      <a-box width="1.8" height="2.6" depth="1" color="#1a1a1a"></a-box>
      <a-box width="1.2" height="0.9" depth="0.04" color="#111" position="0 0.2 0.52"></a-box>
      <a-text value="SNAKE" align="center" color="#f5d46b" position="0 1 0.55" width="3"></a-text>
    </a-entity>

    <a-entity light="type: ambient; intensity: 0.9"></a-entity>
    <a-entity light="type: point; intensity: 0.8; distance: 40" position="0 6 -4"></a-entity>
    <a-camera position="0 1.6 0"></a-camera>
  </a-scene>
</body>
</html>
