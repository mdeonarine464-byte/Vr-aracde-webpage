<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A-Frame Arcade Cabinet</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: #000;
      }

      #ui-panel {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 30;
        background: rgba(0, 0, 0, 0.82);
        border: 1px solid #444;
        border-radius: 10px;
        padding: 10px;
        color: #fff;
        min-width: 220px;
      }

      #ui-panel h2 {
        margin: 0 0 10px;
        font-size: 15px;
      }

      .game-btn {
        width: 100%;
        margin-bottom: 8px;
        padding: 8px 10px;
        border: 1px solid #555;
        border-radius: 8px;
        background: #1a1a1a;
        color: #fff;
        cursor: pointer;
        text-align: left;
      }

      .game-btn:hover,
      .game-btn.active {
        border-color: #00d4ff;
        box-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
      }

      /* Iframe sits directly where the 3D monitor is so game appears on cabinet. */
      #arcade-screen {
        position: fixed;
        left: 50%;
        top: 42.3%;
        width: min(27vw, 410px);
        aspect-ratio: 4 / 3;
        transform: translate(-50%, -50%) perspective(1200px) rotateX(13deg);
        border: 4px solid #080808;
        border-radius: 8px;
        overflow: hidden;
        z-index: 20;
        background: #000;
        box-shadow: 0 0 0 5px rgba(30, 30, 30, 0.9), 0 0 16px rgba(0, 0, 0, 0.85);
      }

      #game-frame {
        width: 100%;
        height: 100%;
        border: 0;
        background: #000;
      }

      @media (max-width: 900px) {
        #arcade-screen {
          top: 41.5%;
          width: 48vw;
        }
      }
    </style>
  </head>
  <body>
    <div id="ui-panel">
      <h2>Arcade Games</h2>
      <button class="game-btn active" data-src="pong.html">Pong</button>
      <button class="game-btn" data-src="Breakout.html">Breakout</button>
      <button class="game-btn" data-src="Tetris.html">Tetris</button>
      <button class="game-btn" data-src="Snake.html">Snake</button>
      <button class="game-btn" data-src="Snake2.html">Snake 2</button>
      <small>Dino game intentionally excluded.</small>
    </div>

    <div id="arcade-screen">
      <iframe id="game-frame" title="Arcade screen" src="pong.html"></iframe>
    </div>

    <a-scene>
      <a-sky color="#101018"></a-sky>

      <a-box position="0 0.6 -1" width="0.8" height="1.2" depth="0.7" color="#1f1f1f"></a-box>
      <a-box position="0 0.9 -0.62" width="0.8" height="0.1" depth="0.32" rotation="-20 0 0" color="#3a3a3a"></a-box>
      <a-box position="0 1.3 -0.83" width="0.62" height="0.45" depth="0.1" rotation="-10 0 0" color="#000"></a-box>
      <a-box position="0 1.62 -0.82" width="0.8" height="0.24" depth="0.45" color="#2d2d2d"></a-box>

      <a-box position="-0.41 0.95 -0.86" width="0.02" height="1.7" depth="0.92" color="#111"></a-box>
      <a-box position="0.41 0.95 -0.86" width="0.02" height="1.7" depth="0.92" color="#111"></a-box>

      <a-cylinder position="-0.16 0.93 -0.54" radius="0.035" height="0.05" color="#00d4ff"></a-cylinder>
      <a-cylinder position="0.06 0.92 -0.53" radius="0.03" height="0.05" color="#ff1f6b"></a-cylinder>
      <a-cylinder position="0.14 0.92 -0.53" radius="0.03" height="0.05" color="#ffe95d"></a-cylinder>

      <a-camera position="0 1.6 1.4"></a-camera>
    </a-scene>

    <script>
      const frame = document.getElementById('game-frame');
      const buttons = document.querySelectorAll('.game-btn');

      buttons.forEach((btn) => {
        btn.addEventListener('click', () => {
          frame.src = btn.dataset.src;
          buttons.forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
        });
      });
    </script>
  </body>
</html>
