<!DOCTYPE html>
<html>
  <head>
    <title>A-Frame Arcade Row</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>

    <!-- Hidden canvas that the snake game renders into (used as a 3-D texture) -->
    <canvas id="snakeCanvas" width="400" height="400" style="display:none"></canvas>

    <script>
      // ── Snake Game Component ─────────────────────────────────────────────
      // Attached to the screen <a-plane>. Runs the classic Snake game loop
      // and writes every frame into #snakeCanvas, then marks the Three.js
      // texture dirty so A-Frame uploads it to the GPU.
      AFRAME.registerComponent('snake-game', {
        init: function () {
          this.canvas = document.getElementById('snakeCanvas');
          this.ctx    = this.canvas.getContext('2d');
          this.grid   = 16;
          this.count  = 0;

          this.snake = { x: 160, y: 160, dx: 16, dy: 0, cells: [], maxCells: 4 };
          this.apple = { x: 320, y: 320 };

          this.onKeyDown = this.onKeyDown.bind(this);
          document.addEventListener('keydown', this.onKeyDown);

          this.drawFrame(); // paint initial frame before first tick
        },

        remove: function () {
          document.removeEventListener('keydown', this.onKeyDown);
        },

        // A-Frame calls tick() every render frame (~60 fps).
        // We throttle the snake logic to ~15 fps (every 4th frame).
        tick: function () {
          if (++this.count < 4) return;
          this.count = 0;

          this.stepGame();
          this.drawFrame();

          // Tell Three.js the canvas texture has new data
          var mesh = this.el.getObject3D('mesh');
          if (mesh && mesh.material && mesh.material.map) {
            mesh.material.map.needsUpdate = true;
          }
        },

        stepGame: function () {
          var s = this.snake, a = this.apple, g = this.grid;
          var w = this.canvas.width, h = this.canvas.height;

          s.x += s.dx; s.y += s.dy;

          // Wrap around edges
          if (s.x < 0)  s.x = w - g; else if (s.x >= w) s.x = 0;
          if (s.y < 0)  s.y = h - g; else if (s.y >= h) s.y = 0;

          s.cells.unshift({ x: s.x, y: s.y });
          if (s.cells.length > s.maxCells) s.cells.pop();

          var self = this;
          s.cells.forEach(function (cell, i) {
            // Ate apple?
            if (cell.x === a.x && cell.y === a.y) {
              s.maxCells++;
              a.x = Math.floor(Math.random() * 25) * g;
              a.y = Math.floor(Math.random() * 25) * g;
            }
            // Self-collision → reset
            for (var j = i + 1; j < s.cells.length; j++) {
              if (cell.x === s.cells[j].x && cell.y === s.cells[j].y) {
                s.x = 160; s.y = 160; s.cells = []; s.maxCells = 4;
                s.dx = g;  s.dy = 0;
                a.x = Math.floor(Math.random() * 25) * g;
                a.y = Math.floor(Math.random() * 25) * g;
              }
            }
          });
        },

        drawFrame: function () {
          var ctx = this.ctx, s = this.snake, a = this.apple, g = this.grid;
          var w = this.canvas.width, h = this.canvas.height;

          // Dark-green background
          ctx.fillStyle = '#001400';
          ctx.fillRect(0, 0, w, h);

          // Apple (red)
          ctx.fillStyle = '#ff3333';
          ctx.fillRect(a.x, a.y, g - 1, g - 1);

          // Snake body (cyan – matches the cabinet accent colour)
          ctx.fillStyle = '#00e5ff';
          s.cells.forEach(function (cell) {
            ctx.fillRect(cell.x, cell.y, g - 1, g - 1);
          });
        },

        onKeyDown: function (e) {
          var s = this.snake, g = this.grid;
          // Arrow keys – prevent back-tracking on the same axis
          if      (e.which === 37 && s.dx === 0) { s.dx = -g; s.dy =  0; }
          else if (e.which === 38 && s.dy === 0) { s.dy = -g; s.dx =  0; }
          else if (e.which === 39 && s.dx === 0) { s.dx =  g; s.dy =  0; }
          else if (e.which === 40 && s.dy === 0) { s.dy =  g; s.dx =  0; }
        }
      });

      // ── Proximity Zoom Component ─────────────────────────────────────────
      // Attach to <a-camera>. When the camera enters the trigger radius around
      // the Snake machine (entity world-position −2, 0, 0) it flies the camera
      // to a close-up position in front of the screen. Press Escape to fly back.
      AFRAME.registerComponent('snake-proximity-zoom', {
        init: function () {
          this.zoomed    = false;
          this.animating = false;
          this.TRIGGER   = 2.0;   // distance (units) that triggers the zoom
          this.MACHINE_X = -2;    // Snake cabinet world X
          this.MACHINE_Z =  0;    // Snake cabinet world Z (entity origin)

          this.onKeyDown = this.onKeyDown.bind(this);
          document.addEventListener('keydown', this.onKeyDown);
        },

        remove: function () {
          document.removeEventListener('keydown', this.onKeyDown);
        },

        tick: function () {
          if (this.zoomed || this.animating) return;

          var p  = this.el.object3D.position;
          var dx = p.x - this.MACHINE_X;
          var dz = p.z - this.MACHINE_Z;

          if (Math.sqrt(dx * dx + dz * dz) < this.TRIGGER) {
            this.zoomIn();
          }
        },

        zoomIn: function () {
          if (this.zoomed || this.animating) return;
          this.animating = true;

          var cam = this.el;

          // Freeze WASD so the animation plays uninterrupted
          cam.setAttribute('wasd-controls', 'enabled', false);

          // Fly to a position directly in front of the Snake screen.
          // Screen world pos ≈ (−2, 1.3, −0.83); we stop at Z=−0.3
          // so the screen fills most of the view.
          cam.setAttribute('animation__zoom', {
            property : 'position',
            to       : '-2 1.3 -0.3',
            dur      : 900,
            easing   : 'easeInOutCubic'
          });

          var self = this;
          setTimeout(function () {
            self.animating = false;
            self.zoomed    = true;
            var hint = document.getElementById('zoom-hint');
            if (hint) hint.setAttribute('visible', true);
          }, 950);
        },

        zoomOut: function () {
          if (!this.zoomed || this.animating) return;
          this.animating = true;
          this.zoomed    = false;

          var hint = document.getElementById('zoom-hint');
          if (hint) hint.setAttribute('visible', false);

          var cam = this.el;
          // Fly back to the default overview position
          cam.setAttribute('animation__zoom', {
            property : 'position',
            to       : '0 1.6 2.5',
            dur      : 900,
            easing   : 'easeInOutCubic'
          });

          var self = this;
          setTimeout(function () {
            self.animating = false;
            cam.setAttribute('wasd-controls', 'enabled', true);
          }, 950);
        },

        onKeyDown: function (e) {
          if (e.key === 'Escape' && this.zoomed) {
            this.zoomOut();
          }
        }
      });
    </script>

    <a-scene>
      <a-sky color="#101820"></a-sky>
      <a-plane position="0 0 -3"     width="18" height="8" color="#1f2937"></a-plane>
      <a-plane position="0 -0.05 -3" width="18" height="8" rotation="-90 0 0" color="#111827"></a-plane>

      <!-- Cabinet 1: Breakout -->
      <a-entity position="-4 0 0">
        <a-box position="0 0.6 -1"       width="0.6"  height="1.2" depth="0.6"  color="#222"></a-box>
        <a-box position="0 0.9 -0.65"    width="0.6"  height="0.1" depth="0.3"  rotation="-20 0 0" color="#444"></a-box>
        <a-box position="0 1.6 -0.8"     width="0.6"  height="0.2" depth="0.4"  color="#333"></a-box>
        <a-box position="-0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8"  color="#111"></a-box>
        <a-box position=" 0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8"  color="#111"></a-box>
        <a-plane position="0 1.3 -0.83"  width="0.48" height="0.35" rotation="-10 0 0" color="#000"></a-plane>
        <a-text value="Breakout\nBreakout.html" position="-0.2 1.31 -0.81" rotation="-10 0 0" width="0.45" color="#39ff14"></a-text>
      </a-entity>

      <!-- Cabinet 2: Snake – live game rendered on the screen -->
      <a-entity position="-2 0 0">
        <a-box position="0 0.6 -1"       width="0.6"  height="1.2" depth="0.6"  color="#222"></a-box>
        <a-box position="0 0.9 -0.65"    width="0.6"  height="0.1" depth="0.3"  rotation="-20 0 0" color="#444"></a-box>
        <a-box position="0 1.6 -0.8"     width="0.6"  height="0.2" depth="0.4"  color="#333"></a-box>
        <a-box position="-0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8"  color="#111"></a-box>
        <a-box position=" 0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8"  color="#111"></a-box>

        <!-- Screen: canvas texture + game logic component -->
        <a-plane id="snake-screen"
                 position="0 1.3 -0.83" width="0.48" height="0.35" rotation="-10 0 0"
                 material="shader: flat; src: #snakeCanvas"
                 snake-game></a-plane>

        <!-- Marquee label above the screen -->
        <a-text value="SNAKE" position="-0.13 1.65 -0.78" rotation="-10 0 0" width="0.35" color="#00e5ff"></a-text>
      </a-entity>

      <!-- Cabinet 3: Snake2 -->
      <a-entity position="0 0 0">
        <a-box position="0 0.6 -1"       width="0.6"  height="1.2" depth="0.6"  color="#222"></a-box>
        <a-box position="0 0.9 -0.65"    width="0.6"  height="0.1" depth="0.3"  rotation="-20 0 0" color="#444"></a-box>
        <a-box position="0 1.6 -0.8"     width="0.6"  height="0.2" depth="0.4"  color="#333"></a-box>
        <a-box position="-0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8"  color="#111"></a-box>
        <a-box position=" 0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8"  color="#111"></a-box>
        <a-plane position="0 1.3 -0.83"  width="0.48" height="0.35" rotation="-10 0 0" color="#000"></a-plane>
        <a-text value="Snake 2\nSnake2.html" position="-0.19 1.31 -0.81" rotation="-10 0 0" width="0.45" color="#ff7b00"></a-text>
      </a-entity>

      <!-- Cabinet 4: Tetris -->
      <a-entity position="2 0 0">
        <a-box position="0 0.6 -1"       width="0.6"  height="1.2" depth="0.6"  color="#222"></a-box>
        <a-box position="0 0.9 -0.65"    width="0.6"  height="0.1" depth="0.3"  rotation="-20 0 0" color="#444"></a-box>
        <a-box position="0 1.6 -0.8"     width="0.6"  height="0.2" depth="0.4"  color="#333"></a-box>
        <a-box position="-0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8"  color="#111"></a-box>
        <a-box position=" 0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8"  color="#111"></a-box>
        <a-plane position="0 1.3 -0.83"  width="0.48" height="0.35" rotation="-10 0 0" color="#000"></a-plane>
        <a-text value="Tetris\nTetris.html" position="-0.16 1.31 -0.81" rotation="-10 0 0" width="0.45" color="#f542aa"></a-text>
      </a-entity>

      <!-- Cabinet 5: Pong -->
      <a-entity position="4 0 0">
        <a-box position="0 0.6 -1"       width="0.6"  height="1.2" depth="0.6"  color="#222"></a-box>
        <a-box position="0 0.9 -0.65"    width="0.6"  height="0.1" depth="0.3"  rotation="-20 0 0" color="#444"></a-box>
        <a-box position="0 1.6 -0.8"     width="0.6"  height="0.2" depth="0.4"  color="#333"></a-box>
        <a-box position="-0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8"  color="#111"></a-box>
        <a-box position=" 0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8"  color="#111"></a-box>
        <a-plane position="0 1.3 -0.83"  width="0.48" height="0.35" rotation="-10 0 0" color="#000"></a-plane>
        <a-text value="Pong\npong.html" position="-0.15 1.31 -0.81" rotation="-10 0 0" width="0.45" color="#ffe600"></a-text>
      </a-entity>

      <!-- Hint shown while zoomed in on the Snake machine -->
      <a-text id="zoom-hint"
              value="ESC  ·  zoom out"
              position="-2 1.85 -0.55"
              align="center"
              width="1.2"
              color="#00e5ff"
              visible="false"></a-text>

      <!-- Camera with the proximity-zoom behaviour -->
      <a-camera position="0 1.6 2.5" snake-proximity-zoom></a-camera>
    </a-scene>
  </body>
</html>
