<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR Arcade Cabinet</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #050505;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    a-scene { width: 100%; height: 100%; }

    #cabinet-screen {
      position: absolute;
      width: min(64vw, 760px);
      height: min(52vh, 540px);
      left: 50%;
      top: 44%;
      transform: translate(-50%, -50%);
      border: 10px solid #111;
      border-radius: 8px;
      box-shadow: 0 0 28px rgba(0, 255, 255, 0.35), inset 0 0 14px rgba(0, 0, 0, 0.75);
      background: #000;
      z-index: 8;
    }

    #game-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    #ui {
      position: absolute;
      left: 50%;
      bottom: 5%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      width: min(92vw, 1100px);
    }

    .game-btn {
      background: #131313;
      color: #f4f4f4;
      border: 1px solid #444;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .game-btn:hover,
    .game-btn.active {
      border-color: #00f2ff;
      color: #00f2ff;
      box-shadow: 0 0 10px rgba(0, 242, 255, 0.25);
    }
  </style>
</head>
<body>
  <div id="app">
    <a-scene embedded>
      <a-entity position="0 1.2 -3.5">
        <a-box width="3.8" height="4.2" depth="2.2" color="#1a1a1a"></a-box>
        <a-box width="2.4" height="1.7" depth="0.2" position="0 0.9 1.1" color="#050505"></a-box>
        <a-box width="2.6" height="1.9" depth="0.05" position="0 0.9 1.16" color="#111"></a-box>
        <a-box width="3.2" height="0.45" depth="1.2" position="0 -0.8 0.2" color="#0d0d0d"></a-box>
        <a-cylinder radius="0.08" height="0.25" position="-0.75 -0.62 0.78" color="#f00"></a-cylinder>
        <a-cylinder radius="0.08" height="0.25" position="-0.45 -0.62 0.78" color="#0f0"></a-cylinder>
        <a-cylinder radius="0.08" height="0.25" position="-0.15 -0.62 0.78" color="#00f"></a-cylinder>
      </a-entity>

      <a-entity light="type: ambient; intensity: 0.7"></a-entity>
      <a-entity light="type: directional; intensity: 0.75" position="1 2 1"></a-entity>
      <a-plane rotation="-90 0 0" width="20" height="20" color="#111"></a-plane>
      <a-camera position="0 1.5 1"></a-camera>
    </a-scene>

    <div id="cabinet-screen">
      <iframe id="game-frame" title="Arcade Game" src="pong.html?embedded=1"></iframe>
    </div>

    <div id="ui">
      <button class="game-btn active" data-src="pong.html?embedded=1">Pong</button>
      <button class="game-btn" data-src="Breakout.html?embedded=1">Breakout</button>
      <button class="game-btn" data-src="Snake.html?embedded=1">Snake</button>
      <button class="game-btn" data-src="Tetris.html?embedded=1">Tetris</button>
      <button class="game-btn" data-src="Snake2.html?embedded=1">Snake RPG</button>
    </div>
  </div>

  <script>
    const frame = document.getElementById('game-frame');
    const buttons = Array.from(document.querySelectorAll('.game-btn'));

    buttons.forEach((btn) => {
      btn.addEventListener('click', () => {
        buttons.forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        frame.src = btn.dataset.src;
        frame.focus();
      });
    });
  </script>
</body>
</html>
