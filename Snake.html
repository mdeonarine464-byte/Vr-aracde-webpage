<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Arcade Cabinet (A-Frame)</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      AFRAME.registerComponent('snake-screen', {
        init: function () {
          this.canvas = document.getElementById('snakeCanvas');
          this.ctx = this.canvas.getContext('2d');
          this.grid = 16;
          this.count = 0;

          this.snake = {
            x: 160,
            y: 160,
            dx: this.grid,
            dy: 0,
            cells: [],
            maxCells: 4
          };

          this.apple = {
            x: 320,
            y: 320
          };

          this.onKeyDown = this.onKeyDown.bind(this);
          document.addEventListener('keydown', this.onKeyDown);
          this.resetBoard();
        },

        remove: function () {
          document.removeEventListener('keydown', this.onKeyDown);
        },

        getRandomInt: function (min, max) {
          return Math.floor(Math.random() * (max - min)) + min;
        },

        resetBoard: function () {
          this.snake.x = 160;
          this.snake.y = 160;
          this.snake.cells = [];
          this.snake.maxCells = 4;
          this.snake.dx = this.grid;
          this.snake.dy = 0;
          this.apple.x = this.getRandomInt(0, 25) * this.grid;
          this.apple.y = this.getRandomInt(0, 25) * this.grid;
        },

        onKeyDown: function (e) {
          if (e.which === 37 && this.snake.dx === 0) {
            this.snake.dx = -this.grid;
            this.snake.dy = 0;
          } else if (e.which === 38 && this.snake.dy === 0) {
            this.snake.dy = -this.grid;
            this.snake.dx = 0;
          } else if (e.which === 39 && this.snake.dx === 0) {
            this.snake.dx = this.grid;
            this.snake.dy = 0;
          } else if (e.which === 40 && this.snake.dy === 0) {
            this.snake.dy = this.grid;
            this.snake.dx = 0;
          }
        },

        tick: function () {
          if (++this.count < 4) {
            return;
          }

          this.count = 0;
          this.ctx.fillStyle = '#000';
          this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

          this.snake.x += this.snake.dx;
          this.snake.y += this.snake.dy;

          if (this.snake.x < 0) {
            this.snake.x = this.canvas.width - this.grid;
          } else if (this.snake.x >= this.canvas.width) {
            this.snake.x = 0;
          }

          if (this.snake.y < 0) {
            this.snake.y = this.canvas.height - this.grid;
          } else if (this.snake.y >= this.canvas.height) {
            this.snake.y = 0;
          }

          this.snake.cells.unshift({ x: this.snake.x, y: this.snake.y });

          if (this.snake.cells.length > this.snake.maxCells) {
            this.snake.cells.pop();
          }

          this.ctx.fillStyle = '#ff3b3b';
          this.ctx.fillRect(this.apple.x, this.apple.y, this.grid - 1, this.grid - 1);

          this.ctx.fillStyle = '#39ff14';

          for (let index = 0; index < this.snake.cells.length; index++) {
            const cell = this.snake.cells[index];
            this.ctx.fillRect(cell.x, cell.y, this.grid - 1, this.grid - 1);

            if (cell.x === this.apple.x && cell.y === this.apple.y) {
              this.snake.maxCells++;
              this.apple.x = this.getRandomInt(0, 25) * this.grid;
              this.apple.y = this.getRandomInt(0, 25) * this.grid;
            }

            for (let i = index + 1; i < this.snake.cells.length; i++) {
              if (cell.x === this.snake.cells[i].x && cell.y === this.snake.cells[i].y) {
                this.resetBoard();
              }
            }
          }
        }
      });
    </script>
    <style>
      body {
        margin: 0;
      }

      #snakeCanvas {
        position: fixed;
        left: -9999px;
      }
    </style>
  </head>
  <body>
    <canvas id="snakeCanvas" width="400" height="400"></canvas>

    <a-scene background="color: #101820">
      <a-entity position="0 0 -2">
        <a-box position="0 0.6 -1" width="0.6" height="1.2" depth="0.6" color="#222"></a-box>
        <a-box position="0 0.9 -0.65" width="0.6" height="0.1" depth="0.3" rotation="-20 0 0" color="#444"></a-box>
        <a-box position="0 1.6 -0.8" width="0.6" height="0.2" depth="0.4" color="#333"></a-box>
        <a-box position="-0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8" color="#111"></a-box>
        <a-box position="0.31 0.9 -0.8" width="0.02" height="1.6" depth="0.8" color="#111"></a-box>

        <a-plane
          position="0 1.3 -0.83"
          width="0.48"
          height="0.35"
          rotation="-10 0 0"
          material="shader: flat; src: #snakeCanvas"
          snake-screen
        ></a-plane>

        <a-text value="Snake" position="-0.08 1.06 -0.76" rotation="-20 0 0" width="0.45" color="#00e5ff"></a-text>
      </a-entity>

      <a-plane position="0 -0.01 -3" width="8" height="8" rotation="-90 0 0" color="#111827"></a-plane>
      <a-camera position="0 1.6 1.7"></a-camera>
    </a-scene>
  </body>
</html>
