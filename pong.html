<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pong</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    html, body { margin: 0; height: 100%; background: #020202; overflow: hidden; font-family: Arial, sans-serif; }
    .scene-wrap { position: fixed; inset: 0; z-index: 0; }
    .game-overlay { position: fixed; inset: 0; z-index: 2; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #fff; pointer-events: none; }
    .hud, .hud-title { margin: 0 0 10px; font-size: 32px; font-family: monospace; text-shadow: 0 0 10px #000; }
    #game { pointer-events: auto; border: 4px solid #181818; box-shadow: 0 0 28px rgba(0,0,0,.8); background: #000; max-width: 90vw; max-height: 80vh; }
  </style>
</head>
<body>
  <div class="scene-wrap" aria-hidden="true">
    <a-scene embedded background="color: #050505">
      <a-entity position="0 0.2 -3">
        <a-box position="0 0 0" depth="1" width="2.6" height="2.9" color="#1a1a1a"></a-box>
        <a-box position="0 0.2 0.53" depth="0.04" width="1.8" height="1.3" color="#0b0b0b"></a-box>
        <a-box position="0 -0.85 0.53" depth="0.06" width="1.2" height="0.22" color="#202020"></a-box>
        <a-text value="PONG" align="center" color="#f5d46b" position="0 1.1 0.55" width="3"></a-text>
      </a-entity>
      <a-plane rotation="-90 0 0" width="20" height="20" color="#0f0f0f"></a-plane>
      <a-entity light="type: ambient; intensity: 0.8"></a-entity>
      <a-entity light="type: point; intensity: 0.8; distance: 20" position="0 3 2"></a-entity>
      <a-camera position="0 1.3 0"></a-camera>
    </a-scene>
  </div>

  <div class="game-overlay">
    <h1 class="hud-title">PONG</h1>
    <canvas width="750" height="585" id="game"></canvas>
  </div>

<script>
const canvas = document.getElementById('game');
const context = canvas.getContext('2d');
const grid = 15;
const paddleHeight = grid * 5;
const maxPaddleY = canvas.height - grid - paddleHeight;

var paddleSpeed = 6;
var ballSpeed = 5;

// NEW SCORE LOGIC: Score variables
let leftScore = 0;
let rightScore = 0;

const leftPaddle = {
  x: grid * 2,
  y: canvas.height / 2 - paddleHeight / 2,
  width: grid,
  height: paddleHeight,
  dy: 0
};
const rightPaddle = {
  x: canvas.width - grid * 3,
  y: canvas.height / 2 - paddleHeight / 2,
  width: grid,
  height: paddleHeight,
  dy: 0
};
const ball = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  width: grid,
  height: grid,
  resetting: false,
  dx: ballSpeed,
  dy: -ballSpeed
};

function collides(obj1, obj2) {
  return obj1.x < obj2.x + obj2.width &&
         obj1.x + obj1.width > obj2.x &&
         obj1.y < obj2.y + obj2.height &&
         obj1.y + obj1.height > obj2.y;
}

function loop() {
  requestAnimationFrame(loop);
  context.clearRect(0,0,canvas.width,canvas.height);

  leftPaddle.y += leftPaddle.dy;
  rightPaddle.y += rightPaddle.dy;

  if (leftPaddle.y < grid) leftPaddle.y = grid;
  else if (leftPaddle.y > maxPaddleY) leftPaddle.y = maxPaddleY;

  if (rightPaddle.y < grid) rightPaddle.y = grid;
  else if (rightPaddle.y > maxPaddleY) rightPaddle.y = maxPaddleY;

  context.fillStyle = 'white';
  context.fillRect(leftPaddle.x, leftPaddle.y, leftPaddle.width, leftPaddle.height);
  context.fillRect(rightPaddle.x, rightPaddle.y, rightPaddle.width, rightPaddle.height);

  ball.x += ball.dx;
  ball.y += ball.dy;

  if (ball.y < grid) {
    ball.y = grid;
    ball.dy *= -1;
  }
  else if (ball.y + grid > canvas.height - grid) {
    ball.y = canvas.height - grid * 2;
    ball.dy *= -1;
  }

  // NEW SCORE LOGIC: Update score when ball goes past paddle
  if ( (ball.x < 0 || ball.x > canvas.width) && !ball.resetting) {
    ball.resetting = true;

    // If ball goes past left side, right player scores
    if (ball.x < 0) rightScore++;
    // If ball goes past right side, left player scores
    else if (ball.x > canvas.width) leftScore++;

    setTimeout(() => {
      ball.resetting = false;
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
    }, 400);
  }

  if (collides(ball, leftPaddle)) {
    ball.dx *= -1;
    ball.x = leftPaddle.x + leftPaddle.width;
  }
  else if (collides(ball, rightPaddle)) {
    ball.dx *= -1;
    ball.x = rightPaddle.x - ball.width;
  }

  context.fillRect(ball.x, ball.y, ball.width, ball.height);

  context.fillStyle = 'lightgrey';
  context.fillRect(0, 0, canvas.width, grid);
  context.fillRect(0, canvas.height - grid, canvas.width, canvas.height);

  for (let i = grid; i < canvas.height - grid; i += grid * 2) {
    context.fillRect(canvas.width / 2 - grid / 2, i, grid, grid);
  }

  // NEW SCORE LOGIC: Draw scores on screen
  context.font = '50px Arial';
  context.textAlign = 'center';
  context.fillText(leftScore, canvas.width / 4, grid * 5);
  context.fillText(rightScore, (canvas.width / 4) * 3, grid * 5);
}

document.addEventListener('keydown', function(e) {
  if (e.which === 38) rightPaddle.dy = -paddleSpeed;
  else if (e.which === 40) rightPaddle.dy = paddleSpeed;
  if (e.which === 87) leftPaddle.dy = -paddleSpeed;
  else if (e.which === 83) leftPaddle.dy = paddleSpeed;
});

document.addEventListener('keyup', function(e) {
  if (e.which === 38 || e.which === 40) rightPaddle.dy = 0;
  if (e.which === 83 || e.which === 87) leftPaddle.dy = 0;
});

requestAnimationFrame(loop);
</script>
</body>
</html>
